name: Publish

on:
  workflow_dispatch:

permissions: {}

jobs:
  pre_publish:
    name: Prepublish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/agave-4.0'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/publish-setup
        with:
          nightly: "true"
          cargo-hack: "true"
      - name: Prepublish
        shell: bash
        run: make prepublish

  verify_crate_owners:
    name: Verify crate owners
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/agave-4.0'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Verify crate owners
        shell: bash
        run: make verify-crate-owners

  publish_dry_run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    needs: [pre_publish, verify_crate_owners]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/agave-4.0'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/publish-setup
      - name: Dry-run publish
        shell: bash
        env:
          ARGS: "--locked"
        run: make publish DRY_RUN=--dry-run

  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: prod
    needs: [pre_publish, publish_dry_run, verify_crate_owners]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/agave-4.0'
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/publish-setup
      - name: Package
        shell: bash
        env:
          ARGS: "--locked"
        run: make package
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: target/package/*.crate
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18  # v1.0.5
        id: auth
      - name: Publish
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          ARGS: "--locked"
        run: make publish
