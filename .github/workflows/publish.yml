name: Publish

on:
  workflow_dispatch:

permissions: {}

jobs:
  pre_publish:
    name: Prepublish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-build-sbf-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-build-sbf-
      - name: Get nightly toolchain version
        id: nightly
        run: echo "version=$(make nightly-version)" >> $GITHUB_OUTPUT
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.nightly.outputs.version }}
          components: rustfmt, clippy
      - name: Get Solana version
        id: solana
        run: echo "version=$(make solana-version)" >> $GITHUB_OUTPUT
      - uses: metaplex-foundation/actions/install-solana@v1
        with:
          cache: true
          version: ${{ steps.solana.outputs.version }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - name: Prepublish
        shell: bash
        run: make prepublish

  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: prod
    needs: pre_publish
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write
      contents: read

    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-build-sbf-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-build-sbf-
      - name: Get Solana version
        id: solana
        run: echo "version=$(make solana-version)" >> $GITHUB_OUTPUT
      - uses: metaplex-foundation/actions/install-solana@v1
        with:
          cache: true
          version: ${{ steps.solana.outputs.version }}
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe  # v1.0.4
        id: auth
      - name: Publish
        shell: bash
        env:
          TOKEN: ${{ steps.auth.outputs.token }}
          ARGS: "--locked"
        run: make publish
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: target/package/*.crate
